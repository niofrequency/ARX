    "wget -q -O /workspace/ComfyUI/models/loras/HARPY_BKAKKE.safetensors 'https://civitai.red/api/download/models/2656100?type=Model&format=SafeTensor&token=85a9d6503e3bd953780fa2250a93452a'",
    "wget -q -O /workspace/ComfyUI/models/loras/LIMABOG_PUSSY.safetensors 'https://civitai.red/api/download/models/2587089?type=Model&format=SafeTensor&token=85a9d6503e3bd953780fa2250a93452a'",
    "wget -q -O /workspace/ComfyUI/models/loras/IR_BJ.safetensors 'https://civitai.red/api/download/models/2320616?type=Model&format=SafeTensor&token=85a9d6503e3bd953780fa2250a93452a'",
    "wget -q -O /workspace/ComfyUI/models/loras/JIB_SKIN.safetensors 'https://civitai.red/api/download/models/2416596?type=Model&format=SafeTensor&token=85a9d6503e3bd953780fa2250a93452a'",
    "wget -q -O /workspace/ComfyUI/models/loras/NRDX_LIGHTING.safetensors 'https://civitai.red/api/download/models/2570732?type=Model&format=SafeTensor&token=85a9d6503e3bd953780fa2250a93452a'"
]
