name: Build ARX Worker Image

on:
  push:
    paths:
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space for AI Image
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          dotnet: true
          android: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: niofrequency/arx-comfyui-worker:v9